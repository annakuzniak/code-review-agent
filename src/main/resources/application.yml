spring:
  application:
    name: code-review-agent
  datasource:
    url: jdbc:postgresql://localhost:5432/codereviewer
    username: postgres
    password: secret
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  autoconfigure:
    exclude: org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
    ollama:
      chat:
        enabled: false
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768

github:
  token: ${GITHUB_TOKEN}
  
server:
  port: 8080
